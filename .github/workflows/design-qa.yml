name: Design QA

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  design-qa:
    name: Design System QA
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: npm run dev &
        env:
          NODE_ENV: development

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Capture screenshots
        run: node scripts/qa-screenshots.mjs
        env:
          BASE_URL: http://localhost:3000

      - name: Check for visual regressions
        run: node scripts/visual-diff.mjs
        env:
          THRESHOLD: "0.5"

      - name: Run accessibility audit
        run: node scripts/a11y-audit.mjs
        env:
          BASE_URL: http://localhost:3000

      - name: Upload diff screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-${{ github.run_id }}
          path: screenshots/diff/
          retention-days: 7

      - name: Upload a11y report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report-${{ github.run_id }}
          path: reports/a11y/
          retention-days: 7

      - name: Comment PR with QA results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            let body = '## ❌ Design QA Failed\n\n'

            // Try to read the QA report if it exists
            try {
              const report = JSON.parse(fs.readFileSync('reports/qa-report.json', 'utf8'))
              const errors = report.findings?.filter(f => f.severity === 'error') ?? []
              const warnings = report.findings?.filter(f => f.severity === 'warning') ?? []

              body += `**${errors.length} error(s), ${warnings.length} warning(s)**\n\n`

              if (errors.length > 0) {
                body += '### Errors\n'
                errors.slice(0, 10).forEach(f => {
                  body += `- **${f.rule}** in \`${f.file || 'unknown'}\`: ${f.message}\n`
                })
                if (errors.length > 10) body += `- _…and ${errors.length - 10} more_\n`
              }
            } catch {
              body += 'Could not parse QA report. Check the workflow logs for details.\n'
            }

            body += '\n---\n_Designer OS QA • [View full logs](' + context.payload.pull_request.html_url + '/checks)_'

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })
